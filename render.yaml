services:
  # ─── Backend Web Service ───────────────────────────────────────────────────
  - type: web
    name: digital-cognitive-twin
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 7d
      # Add these in Render dashboard manually (secrets):
      # MONGODB_URI, JWT_SECRET, GROQ_API_KEY, FRONTEND_URL

  # ─── Frontend Static Site ──────────────────────────────────────────────────
  - type: web
    name: digital-cognitive-twin-1
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://digital-cognitive-twin.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
